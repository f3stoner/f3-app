<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/f3-app/manifest.webmanifest">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="The Q">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#000000">

    <link rel="apple-touch-icon" href="/f3-app/icons/icon-180.png">

    <style>
        html, body {
          margin: 0;
          padding: 0;
          background: #000;
        }
      
        #boot-splash {
          position: fixed;
          inset: 0;
          z-index: 9999;
          background: #000;
          overflow: hidden;

          opacity: 0;
          animation: splashFadeIn 180ms ease forwards;
        }

        @keyframes splashFadeIn {
            to {
                opacity: 1;
            }
        }

        #boot-splash img {
            position: absolute;
            top: 50%;
            left: 50%;

            width: 100vw;
            height: 100vh;
            object-fit: cover;

            transform: translate(-50%, -50%) translateY(6%);
        }
      
        #boot-splash.fade-out {
          opacity: 0;
          transition: opacity 220ms ease;
          pointer-events: none;
        }
      </style>

    <title>F3 App</title>
</head>
<body>
    <div id="boot-splash" aria-hidden="true">
        <img src="/f3-app/splash/splash-1290x2796.png" alt="">
    </div>
    <div id="app"></div>
</body>
</html>
